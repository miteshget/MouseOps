<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MouseOps</title>
<style>
:root {
  --rh-red:        #EE0000;
  --rh-red-hover:  #cc0000;
  --solve:         #198754;
  --solve-hover:   #146c43;
  --validate:      #0d6efd;
  --validate-hover:#0a58ca;
  --danger:        #dc3545;
  --bg:            #f0f2f5;
  --card:          #ffffff;
  --border:        #e0e3e7;
  --text:          #1a1a2e;
  --muted:         #6b7280;
  --header-bg:     #1a1a2e;
  --log-bg:        #0d1117;
  --log-color:     #3fb950;
  --radius:        8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────── */
.app-header {
  background: var(--header-bg);
  color: #fff;
  padding: 0.8rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.brand { display: flex; align-items: center; gap: 0.5rem; }
.brand h1 { font-size: 1.05rem; font-weight: 600; }
.rh-badge {
  background: var(--rh-red);
  color: #fff;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 0.15rem 0.45rem;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.header-actions { display: flex; gap: 0.5rem; align-items: center; }

/* ── Buttons ─────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 0.3rem;
  padding: 0.42rem 0.9rem;
  border-radius: 6px;
  border: 1px solid transparent;
  font-size: 0.85rem; font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .1s;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
.btn:active:not(:disabled) { transform: translateY(1px); }

.btn-primary  { background: var(--rh-red);   color: #fff; border-color: var(--rh-red); }
.btn-primary:hover:not(:disabled) { background: var(--rh-red-hover); border-color: var(--rh-red-hover); }

.btn-outline  { background: transparent; color: #fff; border-color: rgba(255,255,255,.35); }
.btn-outline:hover:not(:disabled) { background: rgba(255,255,255,.1); }

.btn-solve    { background: var(--solve);    color: #fff; border-color: var(--solve); }
.btn-solve:hover:not(:disabled)    { background: var(--solve-hover); border-color: var(--solve-hover); }

.btn-validate { background: var(--validate); color: #fff; border-color: var(--validate); }
.btn-validate:hover:not(:disabled) { background: var(--validate-hover); border-color: var(--validate-hover); }

.btn-ghost  { background: transparent; color: var(--muted); border-color: var(--border); }
.btn-ghost:hover:not(:disabled) { background: var(--bg); color: var(--text); }

.btn-seq    { background: #6f42c1; color: #fff; border-color: #6f42c1; }
.btn-seq:hover:not(:disabled) { background: #5a32a3; border-color: #5a32a3; }

.btn-danger { background: transparent; color: var(--danger); border-color: transparent; padding: 0.42rem 0.6rem; }
.btn-danger:hover:not(:disabled) { background: #fee2e2; }

.btn-sm { padding: 0.28rem 0.6rem; font-size: 0.78rem; }

.btn-icon {
  background: transparent; border: none; color: var(--muted);
  cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.95rem; line-height: 1;
}
.btn-icon:hover { color: var(--text); background: var(--bg); }

/* ── Empty state ──────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 6rem 2rem;
  color: var(--muted);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
.empty-state h2 { font-size: 1.2rem; color: var(--text); margin-bottom: 0.4rem; }
.empty-state p  { margin-bottom: 1.5rem; font-size: 0.9rem; }

/* ── Grid ────────────────────────────────────────── */
.ci-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(390px, 1fr));
  gap: 1.25rem;
  padding: 1.5rem;
  align-items: start;
}

/* ── Card ────────────────────────────────────────── */
.ci-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  transition: box-shadow .2s, border-color .2s;
}
.ci-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.1); }
.ci-card.is-running { border-top: 3px solid var(--validate); }
.ci-card.is-success { border-top: 3px solid var(--solve); }
.ci-card.is-failed  { border-top: 3px solid var(--danger); }

.card-header {
  padding: 0.8rem 1rem;
  background: #fafbfc;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
}
.card-title { font-weight: 700; font-size: 0.9rem; line-height: 1.35; }
.card-url   { font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem; word-break: break-all; }
.card-header-btns { display: flex; gap: 0.2rem; flex-shrink: 0; }

.card-body { padding: 0.85rem 1rem 1rem; }

/* Module row */
.module-row {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 0.75rem;
}
.module-label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; font-weight: 500; }
.module-select, .module-text {
  flex: 1; min-width: 0;
  padding: 0.32rem 0.55rem;
  border: 1px solid var(--border); border-radius: 5px;
  font-size: 0.82rem; background: var(--bg); color: var(--text); outline: none;
}
.module-select:focus, .module-text:focus { border-color: var(--validate); }

/* Action rows */
.action-row { display: flex; gap: 0.45rem; }

.seq-row {
  display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
  margin-top: 0.55rem; padding: 0.45rem 0.65rem;
  background: rgba(111, 66, 193, 0.05);
  border: 1px solid rgba(111, 66, 193, 0.2);
  border-radius: 6px;
}

/* Status line */
.ci-status {
  margin-top: 0.85rem;
  font-size: 0.8rem; color: var(--muted);
  display: flex; align-items: center; gap: 0.4rem;
  min-height: 1.35rem;
}
.ci-status.running { color: var(--validate); }
.ci-status.success { color: var(--solve); }
.ci-status.failed  { color: var(--danger); }

/* Spinner */
.spinner {
  display: inline-block; width: 11px; height: 11px;
  border: 2px solid currentColor; border-right-color: transparent;
  border-radius: 50%; animation: spin .65s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Step list */
.step-list {
  list-style: none; margin-top: 0.6rem;
  display: flex; flex-direction: column; gap: 0.18rem;
  max-height: 190px; overflow-y: auto;
}
.sp-step {
  padding: 0.22rem 0.6rem; border-radius: 4px; font-size: 0.78rem;
  display: flex; align-items: center; gap: 0.3rem;
}
.sp-step-pending { background: #fef3c7; color: #92400e; }
.sp-step-ok      { background: #d1fae5; color: #065f46; }
.sp-step-changed { background: #dbeafe; color: #1e40af; }
.sp-step-fail    { background: #fee2e2; color: #991b1b; }
/* Sequential "from" selector */
.seq-from-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
.seq-from, .seq-to { padding: 0.32rem 0.4rem; border: 1px solid var(--border); border-radius: 5px; font-size: 0.8rem; background: var(--bg); color: var(--text); outline: none; max-width: 120px; }
.seq-from:focus, .seq-to:focus { border-color: var(--validate); }

/* Skip-decision banner */
.skip-section {
  display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;
  margin-top: 0.5rem; padding: 0.45rem 0.65rem;
  background: #fff3cd; border: 1px solid #ffc107; border-radius: 5px;
}
.skip-msg { flex: 1; min-width: 0; font-size: 0.8rem; color: #856404; font-weight: 500; }

/* Module summary table */
.module-history { margin-top: 0.7rem; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; font-size: 0.78rem; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.mh-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; padding: 0.24rem 0.65rem; gap: 0.75rem; border-bottom: 1px solid var(--border); }
.mh-row:last-child { border-bottom: none; }
.mh-header { background: #f5f6f8; font-size: 0.67rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.mh-name { font-family: 'Courier New', monospace; font-size: 0.75rem; }
.mh-badge { display: inline-flex; align-items: center; gap: 0.2rem; padding: 0.1rem 0.45rem; border-radius: 3px; font-size: 0.72rem; font-weight: 500; white-space: nowrap; }
.mh-ok      { background: #d1fae5; color: #065f46; }
.mh-fail    { background: #fee2e2; color: #991b1b; }
.mh-running { background: #dbeafe; color: #1e40af; }
.mh-none    { color: var(--muted); font-size: 0.75rem; }

/* Log panel */
.log-wrap {
  margin-top: 0.75rem; border-radius: 5px; overflow: hidden;
  border: 1px solid #30363d;
}
.log-summary {
  background: #161b22; color: #8b949e;
  padding: 0.38rem 0.75rem; font-size: 0.76rem;
  cursor: pointer; user-select: none;
  list-style: none; display: flex; align-items: center; gap: 0.4rem;
}
.log-summary:hover { color: var(--log-color); }
.log-summary::marker, .log-summary::-webkit-details-marker { display: none; }
.log-summary::before { content: '▶'; font-size: 0.6em; transition: transform .15s; }
.log-wrap[open] > .log-summary::before { transform: rotate(90deg); }
.log-wrap[open] > .log-summary { color: var(--log-color); }
.log-content {
  background: var(--log-bg); color: var(--log-color);
  font-family: 'Courier New', monospace; font-size: 0.7rem;
  padding: 0.6rem 0.75rem; max-height: 210px; overflow-y: auto;
  white-space: pre-wrap; word-break: break-all;
}

/* ── Modal ────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: var(--radius);
  width: 100%; max-width: 470px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden;
}
.modal-header {
  padding: 0.95rem 1.25rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-size: 0.95rem; font-weight: 600; }
.modal form { padding: 1.25rem; display: flex; flex-direction: column; gap: 0.95rem; }
.form-group { display: flex; flex-direction: column; gap: 0.38rem; }
.form-group label { font-size: 0.82rem; font-weight: 500; }
.form-group input {
  padding: 0.48rem 0.7rem; border: 1px solid var(--border); border-radius: 6px;
  font-size: 0.85rem; outline: none; transition: border-color .15s;
}
.form-group input:focus { border-color: var(--validate); }
.form-group small { font-size: 0.72rem; color: var(--muted); }
.optional { font-size: 0.72rem; color: var(--muted); font-weight: normal; }
.mod-helper {
  display: flex; align-items: center; gap: 0.4rem;
  margin-top: 0.38rem; font-size: 0.78rem; color: var(--muted);
}
.mod-helper input[type=number] {
  width: 58px; padding: 0.25rem 0.38rem;
  border: 1px solid var(--border); border-radius: 4px; font-size: 0.78rem; outline: none;
}
.modal-footer {
  display: flex; justify-content: flex-end; gap: 0.5rem;
  border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 0.25rem;
}

@media (max-width: 480px) {
  .ci-grid { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; }
  .header-actions .btn-outline { display: none; }
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────── -->
<header class="app-header">
  <div class="brand">
    <img src="/logo.png" alt="MouseOps" style="height:32px;width:32px;border-radius:50%;object-fit:cover;">
    <h1>MouseOps</h1>
    <span class="rh-badge">RHDP</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="bulkAction('solve')">🚀 Solve All</button>
    <button class="btn btn-outline" onclick="bulkAction('validate')">✓ Validate All</button>
    <button class="btn btn-primary" onclick="openModal()">＋ Add CI</button>
  </div>
</header>

<!-- ── Empty state ────────────────────────────────────────── -->
<div id="empty-state" class="empty-state">
  <div class="icon">🎭</div>
  <h2>No CI instances yet</h2>
  <p>Add a Showroom CI to manage solve &amp; validate actions in one place.</p>
  <button class="btn btn-primary" onclick="openModal()">＋ Add CI</button>
</div>

<!-- ── CI Grid ────────────────────────────────────────────── -->
<main id="ci-grid" class="ci-grid" style="display:none"></main>

<!-- ── Modal ─────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modal-title">Add CI Instance</h2>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <form id="ci-form" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="f-name">Name</label>
        <input type="text" id="f-name" placeholder="e.g. HOL RHEL10 – p5s2g" required>
      </div>
      <div class="form-group">
        <label for="f-url">Showroom URL</label>
        <input type="url" id="f-url" placeholder="https://showroom.apps.cluster.example.com" required>
      </div>
      <div class="form-group">
        <label for="f-token">Auth Token <span class="optional">(optional)</span></label>
        <input type="password" id="f-token" placeholder="Leave blank to keep existing" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="f-modules">Modules</label>
        <input type="text" id="f-modules" placeholder="module-01,module-02,module-03">
        <div class="mod-helper">
          Auto-fill from
          <input type="number" id="f-mod-from" min="0" max="99" value="0" style="width:52px">
          to
          <input type="number" id="f-mod-to" min="0" max="99" value="5" style="width:52px">
          <button type="button" class="btn btn-sm btn-ghost" onclick="autoFill()">Fill</button>
        </div>
        <small>Comma-separated. Leave blank to type module name manually per action.</small>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="submit-btn">Add CI</button>
      </div>
    </form>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────────
const streams    = {};   // ciId → { es, mod, stage, resolve }
const runHistory = {};   // ciId → { [module]: { solve, validate } }  — null|'running'|'ok'|'fail'
const seqFlags      = {};   // ciId → true means user requested stop of sequential run
const skipResolvers = {};   // ciId → resolve fn waiting for skip/stop decision
let editingId    = null;

// ── API helpers ────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch('/api' + path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body:    body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const msg = await res.text().catch(() => res.statusText);
    throw new Error(msg);
  }
  return res.json();
}

// ── Bootstrap ──────────────────────────────────────────────────────────────────
async function boot() {
  const cis = await api('GET', '/cis');
  renderAll(cis);
  loadHistory(cis);
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderAll(cis) {
  const grid  = document.getElementById('ci-grid');
  const empty = document.getElementById('empty-state');
  if (!cis.length) {
    grid.style.display  = 'none';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  grid.style.display  = '';
  grid.innerHTML = '';
  cis.forEach(ci => grid.appendChild(buildCard(ci)));
}

function buildCard(ci) {
  const card = document.createElement('div');
  card.className = 'ci-card';
  card.id = 'card-' + ci.id;
  card.dataset.ciId = ci.id;

  const mods = ci.modules || [];
  const modWidget = mods.length
    ? `<select class="module-select">${mods.map(m => `<option value="${x(m)}">${x(m)}</option>`).join('')}</select>`
    : `<input class="module-text" type="text" placeholder="module-01" value="module-01">`;
  const seqFromWidget = mods.length > 1
    ? `<span class="seq-from-label">from</span>` +
      `<select class="seq-from">${mods.map(m => `<option value="${x(m)}">${x(m)}</option>`).join('')}</select>` +
      `<span class="seq-from-label">to</span>` +
      `<select class="seq-to">${mods.map((m, i) => `<option value="${x(m)}"${i === mods.length - 1 ? ' selected' : ''}>${x(m)}</option>`).join('')}</select>`
    : '';

  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-title">${x(ci.name)}</div>
        <div class="card-url">${x(ci.url)}</div>
      </div>
      <div class="card-header-btns">
        <button class="btn-icon" title="Edit" onclick="openEditModal('${ci.id}')">✎</button>
        <button class="btn-icon btn-danger" title="Remove" onclick="removeCI('${ci.id}')">✕</button>
      </div>
    </div>
    <div class="card-body">
      <div class="module-row">
        <span class="module-label">Module:</span>
        ${modWidget}
      </div>
      <div class="action-row">
        <button class="btn btn-solve"    onclick="startStream('${ci.id}','solve')">🚀 Solve</button>
        <button class="btn btn-validate" onclick="startStream('${ci.id}','validate')">✓ Validate</button>
      </div>
      <div class="seq-row">
        ${seqFromWidget}
        <button class="btn btn-seq run-all-btn" onclick="runSequential('${ci.id}')">▶▶ Run All</button>
        <button class="btn btn-ghost btn-sm stop-btn" style="display:none" onclick="userStop('${ci.id}')">■ Stop</button>
      </div>
      <div class="module-history" style="display:none"></div>
      <div class="ci-status">⏸ Idle</div>
      <div class="skip-section" style="display:none">
        <span class="skip-msg"></span>
        <button class="btn btn-sm btn-seq" onclick="resolveSkip('${ci.id}','skip')">⏭ Skip &amp; Continue</button>
        <button class="btn btn-sm btn-danger" onclick="resolveSkip('${ci.id}','stop')">■ Stop</button>
      </div>
      <ul class="step-list"></ul>
      <details class="log-wrap" style="display:none">
        <summary class="log-summary">Show logs</summary>
        <pre class="log-content"></pre>
      </details>
    </div>`;
  return card;
}

function x(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Stream ─────────────────────────────────────────────────────────────────────
function getModule(ciId) {
  const card = document.getElementById('card-' + ciId);
  const sel  = card.querySelector('.module-select');
  const inp  = card.querySelector('.module-text');
  return (sel ? sel.value : inp ? inp.value : '').trim() || 'module-01';
}

function startStream(ciId, stage, modOverride = null) {
  const mod  = modOverride !== null ? modOverride : getModule(ciId);
  const card = document.getElementById('card-' + ciId);
  if (!card) return Promise.resolve('fail');

  stopStream(ciId);   // cancel any running stream first

  const stepList  = card.querySelector('.step-list');
  const logWrap   = card.querySelector('.log-wrap');
  const logEl     = card.querySelector('.log-content');
  const statusEl  = card.querySelector('.ci-status');
  const stopBtn   = card.querySelector('.stop-btn');
  const solveBtn  = card.querySelector('.btn-solve');
  const validBtn  = card.querySelector('.btn-validate');

  stepList.innerHTML = '';
  logEl.textContent  = '';
  logWrap.style.display = '';
  logWrap.open = false;

  statusEl.className   = 'ci-status running';
  statusEl.innerHTML   = `<span class="spinner"></span> Running ${stage} on ${mod}…`;
  solveBtn.disabled    = true;
  validBtn.disabled    = true;
  stopBtn.style.display = '';
  card.className       = 'ci-card is-running';

  const stepOffsetCount = stepList.querySelectorAll('.sp-step').length;
  setModuleState(ciId, mod, stage, 'running');

  let resolve;
  const promise = new Promise(r => { resolve = r; });

  const es = new EventSource(`/api/stream/${ciId}/${stage}/${encodeURIComponent(mod)}`);
  streams[ciId] = { es, mod, stage, resolve };

  let stepState = { currentTask: null, pendingLi: null };

  es.onmessage = (evt) => {
    if (evt.data === '__DONE__' || evt.data === '__DONE_FAIL__') {
      es.close();
      delete streams[ciId];
      const forceFail = evt.data === '__DONE_FAIL__' ? 'fail' : null;
      if (forceFail) logWrap.open = true;   // auto-open log so error is visible
      const outcome = finalize(ciId, mod, stage, stepOffsetCount, stepList, statusEl, solveBtn, validBtn, stopBtn, card, forceFail);
      resolve(outcome);
      return;
    }
    let line;
    try { line = JSON.parse(evt.data); } catch { line = evt.data; }
    line = String(line);

    logEl.textContent += line + '\n';
    logEl.scrollTop    = logEl.scrollHeight;

    stepState = parseSolveLine(line, stepList, stepState);
    parseValidationMsg(line, stepList);
  };

  es.onerror = () => {
    es.close();
    delete streams[ciId];
    logEl.textContent += '\n❌ Stream connection lost\n';
    finalize(ciId, mod, stage, stepOffsetCount, stepList, statusEl, solveBtn, validBtn, stopBtn, card, 'fail');
    resolve('fail');
  };

  return promise;
}

function stopStream(ciId) {
  const entry = streams[ciId];
  if (!entry) return;
  entry.es.close();
  if (entry.resolve) entry.resolve('stopped');   // unblock any awaiting sequential runner
  delete streams[ciId];
  setModuleState(ciId, entry.mod, entry.stage, null);
  const card = document.getElementById('card-' + ciId);
  if (!card) return;
  card.querySelector('.btn-solve').disabled    = false;
  card.querySelector('.btn-validate').disabled = false;
  card.querySelector('.stop-btn').style.display = 'none';
  const statusEl = card.querySelector('.ci-status');
  statusEl.className   = 'ci-status';
  statusEl.textContent = '⏸ Stopped';
  card.className = 'ci-card';
}

function finalize(ciId, mod, stage, stepOffsetCount, stepList, statusEl, solveBtn, validBtn, stopBtn, card, forceOutcome = null) {
  solveBtn.disabled    = false;
  validBtn.disabled    = false;
  stopBtn.style.display = 'none';

  // Count only steps added during THIS run (slice by offset)
  const allSteps   = Array.from(stepList.querySelectorAll('.sp-step'));
  const thisRun    = allSteps.slice(stepOffsetCount);
  const failed     = thisRun.filter(li => li.classList.contains('sp-step-fail')).length;
  const ok         = thisRun.filter(li => li.classList.contains('sp-step-ok') || li.classList.contains('sp-step-changed')).length;
  const total      = thisRun.length;

  const outcome = forceOutcome || (failed > 0 ? 'fail' : 'ok');
  setModuleState(ciId, mod, stage, outcome);

  if (failed > 0 || forceOutcome === 'fail') {
    statusEl.className   = 'ci-status failed';
    statusEl.textContent = `❌ ${stage} failed — ${failed} task(s) failed`;
    card.className = 'ci-card is-failed';
  } else if (total > 0) {
    statusEl.className   = 'ci-status success';
    statusEl.textContent = `✅ ${stage} completed — ${ok} task(s) OK`;
    card.className = 'ci-card is-success';
  } else {
    statusEl.className   = 'ci-status';
    statusEl.textContent = `⏸ ${stage} completed`;
    card.className = 'ci-card';
  }
  return outcome;
}

// ── Ansible output parsing ─────────────────────────────────────────────────────
const ANSI_RE   = /\x1b\[[0-9;]*m/g;
const SKIP_TASK = /^Gathering Facts$|^Build task results|^set_fact|^Validate all tasks$/i;

function stripAnsi(s) { return s.replace(ANSI_RE, ''); }

function parseSolveLine(line, stepList, state) {
  const clean = stripAnsi(line);
  const tm    = clean.match(/TASK \[([^\]]+)\]/);
  if (tm) {
    const name = tm[1].trim();
    if (SKIP_TASK.test(name)) return { currentTask: null, pendingLi: null };
    const li = document.createElement('li');
    li.className   = 'sp-step sp-step-pending';
    li.textContent = name;
    stepList.appendChild(li);
    return { currentTask: name, pendingLi: li };
  }
  const { pendingLi } = state;
  if (!pendingLi) return state;

  if      (/^ok:\s*\[/i.test(clean))              pendingLi.className = 'sp-step sp-step-ok';
  else if (/^changed:\s*\[/i.test(clean))          pendingLi.className = 'sp-step sp-step-changed';
  else if (/^(fatal|failed):/i.test(clean))        pendingLi.className = 'sp-step sp-step-fail';
  else if (/^skipping:\s*\[/i.test(clean))         pendingLi.remove();
  return state;
}

function parseValidationMsg(line, stepList) {
  const clean = stripAnsi(line).trim();
  const m     = clean.match(/"msg":\s*"(.+)"$/);
  if (!m) return;
  const msg = m[1].replace(/\\n/g, '\n').replace(/\\"/g, '"');
  msg.split('\n').forEach(part => {
    const t = part.trim();
    if (!t) return;
    const li = document.createElement('li');
    li.className   = /^✅/.test(t) ? 'sp-step sp-step-ok'
                   : /^❌/.test(t) ? 'sp-step sp-step-fail'
                   : 'sp-step sp-step-pending';
    li.textContent = t;
    stepList.appendChild(li);
  });
}

// ── Sequential run ─────────────────────────────────────────────────────────────
function userStop(ciId) {
  seqFlags[ciId] = true;
  stopStream(ciId);
  resolveSkip(ciId, 'stop');   // also unblock any paused skip-decision
}

function awaitSkipDecision(ciId, msg) {
  const card = document.getElementById('card-' + ciId);
  if (!card) return Promise.resolve('stop');
  const section = card.querySelector('.skip-section');
  section.querySelector('.skip-msg').textContent = msg;
  section.style.display = '';
  return new Promise(resolve => { skipResolvers[ciId] = resolve; });
}

function resolveSkip(ciId, decision) {
  const resolve = skipResolvers[ciId];
  if (!resolve) return;
  delete skipResolvers[ciId];
  const card = document.getElementById('card-' + ciId);
  if (card) card.querySelector('.skip-section').style.display = 'none';
  resolve(decision);
}

function setCardModule(ciId, mod) {
  const card = document.getElementById('card-' + ciId);
  if (!card) return;
  const sel = card.querySelector('.module-select');
  const inp = card.querySelector('.module-text');
  if (sel) sel.value = mod;
  else if (inp) inp.value = mod;
}

async function runSequential(ciId) {
  const cis = await api('GET', '/cis');
  const ci  = cis.find(c => c.id === ciId);
  const card = document.getElementById('card-' + ciId);
  if (!card) return;

  const mods = ci && ci.modules && ci.modules.length ? ci.modules : null;
  if (!mods) {
    const statusEl = card.querySelector('.ci-status');
    statusEl.className   = 'ci-status failed';
    statusEl.textContent = '❌ No modules configured — add modules in Edit to use Run All';
    return;
  }

  seqFlags[ciId]   = false;
  const runAllBtn  = card.querySelector('.run-all-btn');
  const solveBtn   = card.querySelector('.btn-solve');
  const validBtn   = card.querySelector('.btn-validate');
  const statusEl   = card.querySelector('.ci-status');
  const fromSelect = card.querySelector('.seq-from');
  const toSelect   = card.querySelector('.seq-to');
  const startMod   = fromSelect ? fromSelect.value : mods[0];
  const endMod     = toSelect   ? toSelect.value   : mods[mods.length - 1];
  const startIdx   = Math.max(0, mods.indexOf(startMod));
  const endIdx     = toSelect ? Math.min(mods.length - 1, Math.max(startIdx, mods.indexOf(endMod))) : mods.length - 1;

  runAllBtn.disabled = true;
  solveBtn.disabled  = true;
  validBtn.disabled  = true;
  if (fromSelect) fromSelect.disabled = true;
  if (toSelect)   toSelect.disabled   = true;

  let stoppedAt = null;

  for (let i = startIdx; i <= endIdx; i++) {
    if (seqFlags[ciId]) { stoppedAt = mods[i]; break; }

    const mod = mods[i];
    setCardModule(ciId, mod);

    // Solve
    const sp = startStream(ciId, 'solve', mod);
    statusEl.innerHTML = `<span class="spinner"></span> [${i + 1}/${mods.length}] Solving ${mod}…`;
    const solveResult  = await sp;
    if (seqFlags[ciId] || solveResult === 'stopped') { stoppedAt = mod; break; }
    if (solveResult !== 'ok') {
      const d = await awaitSkipDecision(ciId, `Solve failed on ${mod} — skip and continue?`);
      if (d === 'stop') { stoppedAt = mod; break; }
      continue;   // skip validate + remaining steps for this module
    }

    // Validate (only on solve pass)
    const vp = startStream(ciId, 'validate', mod);
    statusEl.innerHTML = `<span class="spinner"></span> [${i + 1}/${mods.length}] Validating ${mod}…`;
    const validateResult = await vp;
    if (seqFlags[ciId] || validateResult === 'stopped') { stoppedAt = mod; break; }
    if (validateResult !== 'ok') {
      const d = await awaitSkipDecision(ciId, `Validate failed on ${mod} — skip and continue?`);
      if (d === 'stop') { stoppedAt = mod; break; }
      continue;   // skip to next module
    }
  }

  delete seqFlags[ciId];
  runAllBtn.disabled = false;
  solveBtn.disabled  = false;
  validBtn.disabled  = false;
  if (fromSelect) fromSelect.disabled = false;
  if (toSelect)   toSelect.disabled   = false;
  card.querySelector('.stop-btn').style.display = 'none';

  if (stoppedAt) {
    statusEl.className   = 'ci-status failed';
    statusEl.textContent = `❌ Sequential run stopped at ${stoppedAt}`;
    card.className = 'ci-card is-failed';
  } else {
    statusEl.className   = 'ci-status success';
    statusEl.textContent = `✅ Sequential run complete — all ${mods.length} module(s) passed`;
    card.className = 'ci-card is-success';
  }
}

// ── Module summary ─────────────────────────────────────────────────────────────
const LS_KEY = 'showroom-run-history';

function saveHistory() {
  // Strip 'running' states — they're stale after a page refresh
  const clean = {};
  Object.entries(runHistory).forEach(([ciId, mods]) => {
    clean[ciId] = {};
    Object.entries(mods).forEach(([mod, s]) => {
      clean[ciId][mod] = {
        solve:    s.solve    === 'running' ? null : s.solve,
        validate: s.validate === 'running' ? null : s.validate,
      };
    });
  });
  localStorage.setItem(LS_KEY, JSON.stringify(clean));
}

function loadHistory(cis) {
  const stored = localStorage.getItem(LS_KEY);
  if (!stored) return;
  try {
    const data    = JSON.parse(stored);
    const validIds = new Set(cis.map(c => c.id));
    Object.entries(data).forEach(([ciId, mods]) => {
      if (!validIds.has(ciId)) return;   // prune orphaned CIs
      runHistory[ciId] = mods;
      renderModuleSummary(ciId);
    });
  } catch { /* corrupt localStorage — ignore */ }
}

function setModuleState(ciId, mod, stage, state) {
  if (!runHistory[ciId])       runHistory[ciId] = {};
  if (!runHistory[ciId][mod])  runHistory[ciId][mod] = { solve: null, validate: null };
  runHistory[ciId][mod][stage] = state;
  saveHistory();
  renderModuleSummary(ciId);
}

function renderModuleSummary(ciId) {
  const card = document.getElementById('card-' + ciId);
  if (!card) return;
  const el      = card.querySelector('.module-history');
  const history = runHistory[ciId] || {};
  const mods    = Object.keys(history);
  if (!mods.length) { el.style.display = 'none'; return; }
  el.style.display = '';
  el.innerHTML =
    `<div class="mh-row mh-header"><span>Module</span><span>Solve</span><span>Validate</span></div>` +
    mods.map(m =>
      `<div class="mh-row">` +
      `<span class="mh-name">${x(m)}</span>` +
      `<span>${badgeHtml(history[m].solve)}</span>` +
      `<span>${badgeHtml(history[m].validate)}</span>` +
      `</div>`
    ).join('');
}

function badgeHtml(state) {
  if (state === 'running') return `<span class="mh-badge mh-running"><span class="spinner" style="width:9px;height:9px;border-width:1.5px"></span> running</span>`;
  if (state === 'ok')      return `<span class="mh-badge mh-ok">✅ Pass</span>`;
  if (state === 'fail')    return `<span class="mh-badge mh-fail">❌ Fail</span>`;
  return `<span class="mh-none">—</span>`;
}

// ── Bulk actions ───────────────────────────────────────────────────────────────
function bulkAction(stage) {
  document.querySelectorAll('.ci-card').forEach(card => {
    startStream(card.dataset.ciId, stage);
  });
}

// ── CRUD ───────────────────────────────────────────────────────────────────────
async function removeCI(ciId) {
  if (!confirm('Remove this CI instance?')) return;
  await api('DELETE', '/cis/' + ciId);
  delete runHistory[ciId];
  saveHistory();
  boot();
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function openModal(ci) {
  editingId = ci ? ci.id : null;
  document.getElementById('modal-title').textContent  = ci ? 'Edit CI Instance' : 'Add CI Instance';
  document.getElementById('submit-btn').textContent   = ci ? 'Save Changes'     : 'Add CI';
  document.getElementById('f-name').value    = ci ? ci.name                     : '';
  document.getElementById('f-url').value     = ci ? ci.url                      : '';
  document.getElementById('f-token').value   = '';   // never pre-fill; blank = keep existing
  document.getElementById('f-modules').value = ci ? (ci.modules || []).join(',') : '';
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('f-name').focus();
}

async function openEditModal(ciId) {
  const cis = await api('GET', '/cis');
  const ci  = cis.find(c => c.id === ciId);
  if (ci) openModal(ci);
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target.id === 'modal-overlay') closeModal();
}

function autoFill() {
  const from = parseInt(document.getElementById('f-mod-from').value) || 0;
  const to   = parseInt(document.getElementById('f-mod-to').value)   || 5;
  if (to < from) return;
  const mods = [];
  for (let i = from; i <= to; i++) mods.push('module-' + String(i).padStart(2, '0'));
  document.getElementById('f-modules').value = mods.join(',');
}

async function handleSubmit(e) {
  e.preventDefault();
  const name      = document.getElementById('f-name').value.trim();
  const url       = document.getElementById('f-url').value.trim();
  const token     = document.getElementById('f-token').value.trim();
  const rawMods   = document.getElementById('f-modules').value.trim();
  const modules   = rawMods ? rawMods.split(',').map(m => m.trim()).filter(Boolean) : [];

  const body = { name, url, token, modules };

  if (editingId) {
    await api('PUT', '/cis/' + editingId, body);
  } else {
    await api('POST', '/cis', body);
  }
  closeModal();
  boot();
}

// ── Keyboard ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Init ───────────────────────────────────────────────────────────────────────
boot().catch(err => console.error('Boot failed:', err));
</script>
